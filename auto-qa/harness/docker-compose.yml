    #     depends_on:
    #         anvil:
    #             condition: service_healthy
    #         api:
    #             condition: service_started
    #         registry-checkpoint:
    #             condition: service_started
    #         checkpoint:
    #             condition: service_started
    #     working_dir: /app
    #     volumes:
    #         - .:/app                      # mount harness/ itself
    #         - orchestrator-node-modules:/app/node_modules
