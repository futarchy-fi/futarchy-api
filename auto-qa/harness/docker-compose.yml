    #     command: ["npm", "run", "test"]

    # ────────────────────────────────────────────────────────────────
    # Phase 0: A no-op service so `docker compose config` validates and
    # CI has something to spin up while we build the rest. Remove when
    # at least one real service is enabled.
    # ────────────────────────────────────────────────────────────────
    placeholder:
        image: hello-world
        container_name: harness-placeholder
        networks: [harness-net]
