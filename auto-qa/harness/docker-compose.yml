# Forked Replay Harness — service composition
#
# Phase 0 SCAFFOLD ONLY. Nothing here is wired up; this file documents
# the eventual service topology so the layout is reviewable now.
#
# Phases that activate which services:
#   Phase 1 — anvil (uncomment + add the build/image)
#   Phase 2 — futarchy-api (point at anvil)
#   Phase 3 — checkpoint indexer (point at anvil)
#   Phase 4 — orchestrator (drives anvil + sends txs)
#   Phase 5 — interface-dev (Next.js dev server pointed at anvil; only
#             needed when running Playwright e2e — a sibling clone of
#             interface repo is mounted)
#
# Run target (Phase 7+):
#   docker compose -f auto-qa/harness/docker-compose.yml up -d
#   then: npm run auto-qa:e2e:replay
#
# Conventions:
#   - All services on a single internal network "harness-net"
#   - Anvil always exposes 8545; everything else routes via this name
#   - No ports exposed to host EXCEPT for debug (commented blocks below)
#   - Volumes go into ./.compose-volumes/ (gitignored)

# Note: no top-level `version` key — Docker Compose v2+ deprecates it.

name: futarchy-replay-harness

networks:
    harness-net:
        driver: bridge

# ────────────────────────────────────────────────────────────────────
# Phase 7 slice 4b-include: pull in the sibling indexer compose files.
#
# Per ADR-002 (Accepted), the harness uses build-from-source indexers
# via a sibling `futarchy-indexers` clone. Phase 3 implemented this via
# `scripts/start-indexers.mjs` (per-indexer compose projects, native
# anvil). For the Phase 7 single-stack vision, the harness compose now
# `include:`s the indexer compose files so `docker compose -f
# auto-qa/harness/docker-compose.yml up -d` brings everything up in
# one shot.
#
# Service-name reality (different from the Phase 0 stub's assumptions):
#   registry compose: registry-checkpoint (port 3003), registry-postgres (5435)
#   candles  compose: checkpoint          (port 3001), postgres          (5434)
#
# Note: candles uses `checkpoint` + `postgres` as bare service names,
# NOT `candles-checkpoint` + `candles-postgres`. The container_names
# are prefixed (`futarchy-candles-checkpoint-1`) but the service names
# in the included compose are bare. The harness's network/env merge
# blocks below have to use those bare names.
include:
    - path: ../../../futarchy-indexers/futarchy-complete/checkpoint/docker-compose.yml
    - path: ../../../futarchy-indexers/proposals-candles/checkpoint/docker-compose.yml
# ────────────────────────────────────────────────────────────────────

# Top-level service stubs — ALL DISABLED in Phase 0.
# Each block lists the eventual command + the phase that turns it on.
services:
    # ────────────────────────────────────────────────────────────────
    # Phase 1: Anvil fork of Gnosis. Forks `latest` by default; for
    # scenario replays (Phase 6) override FORK_BLOCK with a specific
    # block number — but note the command list below does NOT yet
    # plumb FORK_BLOCK through (it requires a shell wrapper to handle
    # the "no flag when latest" case; deferred to Phase 6 when we
    # actually need pinned blocks).
    #
    # We use the published Foundry image rather than building locally
    # so CI doesn't need to compile Rust.
    # ────────────────────────────────────────────────────────────────
    anvil:
        image: ghcr.io/foundry-rs/foundry:latest
        container_name: harness-anvil
        networks: [harness-net]
        environment:
            FORK_URL: ${FORK_URL:-https://rpc.gnosis.gateway.fm}
        command:
            - anvil
            - --host
            - "0.0.0.0"
            - --port
            - "8545"
            - --fork-url
            - ${FORK_URL:-https://rpc.gnosis.gateway.fm}
            - --chain-id
            - "100"
            - --no-mining
            - --accounts
            - "10"
            - --balance
            - "10000"
        ports:
            # Expose to host for the harness test runner. Comment out
            # if running fully containerized (orchestrator inside compose).
            - "${ANVIL_HOST_PORT:-8545}:8545"
        healthcheck:
            test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
            interval: 2s
            timeout: 2s
            retries: 30
            start_period: 5s

    # ────────────────────────────────────────────────────────────────
    # Phase 7 slice 4b-network-wire: TODO.
    #
    # Naive approach (declaring same-name service blocks here to
    # extend included services) FAILS in compose v2.34:
    #   `services.registry-checkpoint conflicts with imported resource`
    # `include:` rejects same-name service definitions in the parent.
    #
    # Three alternatives to evaluate next iteration:
    #
    # (a) Override-list form: `include: - path: [base.yml, overrides.yml]`
    #     where overrides.yml has a `services:` block. Compose applies
    #     the standard multi-file merge BEFORE include, so name
    #     collisions don't happen.
    #
    # (b) Per-service `extends:` + drop `include:`. Each indexer
    #     service is declared here with `extends: { file: ..., service:
    #     ... }` plus the harness overrides. ~4 service blocks
    #     (registry-checkpoint, registry-postgres, checkpoint,
    #     postgres) but no include conflict.
    #
    # (c) Multi-file `docker compose -f base.yml -f overrides.yml`
    #     instead of include:. Breaks the "single docker-compose.yml"
    #     promise of the slice 4 acceptance gate; rejected.
    #
    # Approach (b) is the closest fit for ADR-002's "wrapper service
    # that delegates to it" leg. The decision will be made + executed
    # in slice 4b-network-wire next iteration.
    # ────────────────────────────────────────────────────────────────

    # ────────────────────────────────────────────────────────────────
    # Phase 2 / Phase 7 slice 4a: futarchy-api pointed at the local
    # anvil. The indexer dependency is intentionally OMITTED until
    # slice 4b adds the indexer service — without it, request-time
    # endpoints that proxy to CHECKPOINT_URL will fail, but the
    # Express server itself still starts and `docker compose build api`
    # / `up api` succeed.
    #
    # Dockerfile uses node:22-alpine, runs `npm ci --omit=dev`, and
    # `EXPOSE 3031`. `src/index.js:25` hardcodes `const PORT = 3031`
    # (does NOT read process.env.PORT), so PORT here is informational
    # only — changing it would NOT actually re-bind the api server.
    # If you need a different external port, change the host side of
    # the `ports:` mapping below, not the container side.
    # ────────────────────────────────────────────────────────────────
    api:
        build:
            # Build context = api repo root (where Dockerfile + package.json live).
            # Path is `../..` from this compose file's location
            # (auto-qa/harness/), not `../../..` as the original Phase 0
            # scaffold had — that was a slice-4a finding (the Phase 0
            # path landed at /Users/kas/, the parent of the repo).
            context: ../..
            dockerfile: Dockerfile
        container_name: harness-api
        networks: [harness-net]
        depends_on:
            anvil:
                condition: service_healthy
            # registry-checkpoint + checkpoint deps are intentionally
            # NOT declared here yet because they're on different
            # networks (registry-net / checkpoint-net) and the api is
            # on harness-net. Until slice 4b-network-wire bridges
            # those networks, declaring these deps would prevent the
            # api from starting (compose would wait forever for
            # cross-network healthchecks). Slice 4b-api-env (this
            # change) corrects ONLY the env var names; depends_on
            # waits for slice 4b-network-wire.
        environment:
            RPC_URL: http://anvil:8545
            # Phase 0 stub used `CHECKPOINT_URL` — but the api never
            # reads that. `src/config/endpoints.js` reads
            # `REGISTRY_URL` + `CANDLES_URL` (defaults
            # `localhost:3003` + `localhost:3001`). Now wired to the
            # included indexer services by their compose-internal
            # service name + container port (NOT the host port).
            # Note: until 4b-network-wire bridges the networks, the
            # api won't actually be able to reach these — but the env
            # contract is right and matches src/config/endpoints.js.
            REGISTRY_URL: http://registry-checkpoint:3000/graphql
            CANDLES_URL:  http://checkpoint:3000/graphql
            FUTARCHY_MODE: checkpoint
            PORT: 3031   # informational — src/index.js hardcodes 3031
        # ports:
        #     - "3031:3031"   # api — host:container both 3031
        # Uncomment if you want host access to the api during local debug
        # (compose-internal traffic uses the service name, not host port).

    # ────────────────────────────────────────────────────────────────
    # Phase 5: Next.js dev server from the sibling interface repo,
    # pointed at the local api + anvil. Mounted as a sibling clone
    # because the harness lives in futarchy-api but needs the
    # interface code to spin up the UI.
    #
    # Convention: clone interface to ../interface relative to this
    # docker-compose.yml.
    # ────────────────────────────────────────────────────────────────
    # interface-dev:
    #     image: node:20-bookworm-slim
    #     container_name: harness-interface
    #     networks: [harness-net]
    #     depends_on:
    #         api:
    #             condition: service_started
    #     working_dir: /app
    #     volumes:
    #         - ${INTERFACE_PATH:-../../../../interface}:/app
    #     environment:
    #         NEXT_PUBLIC_RPC_URL: http://anvil:8545
    #         NEXT_PUBLIC_API_URL: http://api:3000
    #     command: ["npm", "run", "dev"]
    #     # ports:
    #     #     - "3010:3000"   # interface dev server (when needed for live debug)

    # ────────────────────────────────────────────────────────────────
    # Phase 4: Orchestrator. Drives anvil's clock, sends synthetic
    # swap txs, and runs cross-layer assertions. Currently a no-op
    # placeholder that exits.
    # ────────────────────────────────────────────────────────────────
    # orchestrator:
    #     image: node:20-bookworm-slim
    #     container_name: harness-orchestrator
    #     networks: [harness-net]
    #     depends_on:
    #         anvil:
    #             condition: service_healthy
    #     working_dir: /app
    #     volumes:
    #         - ../../../auto-qa/harness:/app
    #     environment:
    #         RPC_URL: http://anvil:8545
    #         API_URL: http://api:3000
    #         CHECKPOINT_URL: http://indexer:3001/graphql
    #     command: ["npm", "run", "test"]

    # ────────────────────────────────────────────────────────────────
    # (Phase 0 placeholder removed — anvil is real now.)
    # ────────────────────────────────────────────────────────────────
