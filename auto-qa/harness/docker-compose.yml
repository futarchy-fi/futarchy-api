    #         RPC_URL: http://anvil:8545
    #         API_URL: http://api:3031
    #         REGISTRY_URL: http://registry-checkpoint:3000/graphql
    #         CANDLES_URL: http://checkpoint:3000/graphql
    #         FUTARCHY_MODE: checkpoint
    #         HARNESS_COMPOSE: "1"          # signal compose mode
